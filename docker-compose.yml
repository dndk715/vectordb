version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: vectordb-mongodb
    ports:
      - "27017:27017"
    # 인증 비활성화 - 개발 환경용
    # environment:
    #   MONGO_INITDB_ROOT_USERNAME: admin
    #   MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - vectordb-network

  # MongoDB 웹 UI
  mongo-express:
    image: mongo-express:latest
    container_name: vectordb-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      # ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      # ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - vectordb-network

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: vectordb-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - vectordb-network

  # 선택사항: Kibana (Elasticsearch 관리용)
  kibana:
    image: kibana:8.11.0
    container_name: vectordb-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - vectordb-network

volumes:
  mongodb_data:
  elasticsearch_data:

networks:
  vectordb-network:
    driver: bridge 